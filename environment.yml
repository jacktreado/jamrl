name: jamrl
channels:
  - conda-forge
dependencies:
  - python=3.11
  - numpy>=1.26
  - scipy>=1.11
  - h5py>=3.10
  - pandas>=2.1
  - pyarrow>=14
  - pyyaml>=6
  - matplotlib>=3.8
  - jinja2>=3.1
  - pytest>=8
  - cmake>=3.21
  - ninja>=1.11
  - pybind11>=2.11
  - eigen>=3.4
  # Spectra (C++ header-only eigensolver) is not on conda-forge; CMake fetches it.
  - scikit-build-core>=0.8
  - llvm-openmp
  # PyTorch via conda-forge (NOT pip): the conda build links the env's own
  # llvm-openmp/MKL, so there is a single OpenMP runtime in-process. pip-torch
  # bundles its own libiomp5 and segfaults at import inside an anaconda env.
  - pytorch>=2.1
  - pip
